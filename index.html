                      <div className="alert alert-warning">
                        ⚠️ Este precio genera pérdida.
                      </div>
                    )}

                    <button
                      className="btn btn-primary"
                      onClick={confirmar}
                      disabled={loading || !precioValido}
                    >
                      {loading ? (
                        <span className="spinner" />
                      ) : (
                        `✅ Confirmar venta (${totalPaquetes} paquete${totalPaquetes !== 1 ? "s" : ""})`
                      )}
                    </button>
                  </>
                );
              })()}
          </div>
        );
      }

      // ── HISTORIAL ─────────────────────────────────────────────
      function CalendarioHistorial({
        ventas,
        simsMap,
        clientesMap,
        onCobrar,
        loading,
      }) {
        const hoy = new Date();
        const [mes, setMes] = useState(hoy.getMonth());
        const [anio, setAnio] = useState(hoy.getFullYear());
        const [diaSelec, setDiaSelec] = useState(hoy.getDate());

        // Agrupar ventas por día YYYY-MM-DD
        const ventasPorDia = useMemo(() => {
          const m = {};
          ventas.forEach((v) => {
            const d = new Date(v.fecha);
            if (d.getFullYear() === anio && d.getMonth() === mes) {
              const k = d.getDate();
              if (!m[k]) m[k] = [];
              m[k].push(v);
            }
          });
          return m;
        }, [ventas, mes, anio]);

        const primerDia = new Date(anio, mes, 1).getDay(); // 0=domingo
        const diasEnMes = new Date(anio, mes + 1, 0).getDate();
        const celdas = primerDia + diasEnMes;

        const nombresMes = [
          "Enero",
          "Febrero",
          "Marzo",
          "Abril",
          "Mayo",
          "Junio",
          "Julio",
          "Agosto",
          "Septiembre",
          "Octubre",
          "Noviembre",
          "Diciembre",
        ];
        const diasSem = ["D", "L", "M", "X", "J", "V", "S"];

        function navMes(delta) {
          let m = mes + delta,
            y = anio;
          if (m < 0) {
            m = 11;
            y--;
          }
          if (m > 11) {
            m = 0;
            y++;
          }
          setMes(m);
          setAnio(y);
          setDiaSelec(null);
        }

        const ventasDia = diaSelec ? ventasPorDia[diaSelec] || [] : [];
        const esMesActual =
          mes === hoy.getMonth() && anio === hoy.getFullYear();

        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              gap: "var(--space-md)",
            }}
          >
            {/* Nav de mes */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
              }}
            >
              <button
                onClick={() => navMes(-1)}
                style={{
                  background: "none",
                  border: "none",
                  color: "#64748b",
                  fontSize: "1.2rem",
                  cursor: "pointer",
                  padding: "var(--space-xs)",
                }}
              >
                ‹
              </button>
              <span style={{ fontWeight: 700, fontSize: "var(--text-md)" }}>
                {nombresMes[mes]} {anio}
              </span>
              <button
                onClick={() => navMes(1)}
                style={{
                  background: "none",
                  border: "none",
                  color: "#64748b",
                  fontSize: "1.2rem",
                  cursor: "pointer",
                  padding: "var(--space-xs)",
                }}
              >
                ›
              </button>
            </div>

            {/* Cabecera días */}
            <div className="cal-header">
              {diasSem.map((d) => (
                <div key={d} className="cal-day-label">
                  {d}
                </div>
              ))}
            </div>

            {/* Grid del calendario */}
            <div className="cal-grid">
              {Array.from({ length: Math.ceil(celdas / 7) * 7 }, (_, i) => {
                const dia = i - primerDia + 1;
                const valido = dia >= 1 && dia <= diasEnMes;
                const esHoyCell = esMesActual && dia === hoy.getDate();
                const tieneVentas = valido && ventasPorDia[dia]?.length > 0;
                const tienePendiente =
                  tieneVentas &&
                  ventasPorDia[dia].some((v) => v.estado_pago === "pendiente");
                const seleccionado = diaSelec === dia && valido;
                return (
                  <div
                    key={i}
                    className={`cal-cell ${!valido ? "empty" : ""} ${esHoyCell ? "today" : ""} ${tieneVentas ? "has-ventas" : ""} ${seleccionado ? "selected" : ""}`}
                    onClick={() =>
                      valido && setDiaSelec(seleccionado ? null : dia)
                    }
                  >
                    {valido && (
                      <>
                        <span className="cal-cell-num">{dia}</span>
                        {tieneVentas && (
                          <div
                            className={`cal-cell-dot ${tienePendiente ? "pendiente" : ""}`}
                          />
                        )}
                      </>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Detalle del día seleccionado */}
            {diaSelec && (
              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: "var(--space-sm)",
                }}
              >
                <div
                  style={{
                    fontSize: "var(--text-xs)",
                    color: "#64748b",
                    fontWeight: 700,
                    textTransform: "uppercase",
                    letterSpacing: ".05em",
                  }}
                >
                  {diaSelec} de {nombresMes[mes]} — {ventasDia.length} venta
                  {ventasDia.length !== 1 ? "s" : ""}
                  {ventasDia.length > 0 && (
                    <span
                      style={{
                        marginLeft: "var(--space-sm)",
                        color: "#22c55e",
                      }}
                    >
                      · $
                      {ventasDia
                        .filter((v) => v.estado_pago === "pagado")
                        .reduce((s, v) => s + Number(v.ganancia), 0)
                        .toFixed(2)}{" "}
                      cobrado
                    </span>
                  )}
                </div>
                {ventasDia.length === 0 ? (
                  <div className="empty" style={{ padding: "1rem" }}>
                    Sin ventas este día
                  </div>
                ) : (
                  ventasDia
                    .sort((a, b) => new Date(b.fecha) - new Date(a.fecha))
                    .map((v) => {
                      const cliente = v.cliente_id
                        ? clientesMap[v.cliente_id]
                        : null;
                      const sim = simsMap[v.sim_id];
                      return (
                        <div
                          key={v.id}
                          className="list-item"
                          style={{
                            flexDirection: "column",
                            gap: "var(--space-sm)",
                            alignItems: "stretch",
                          }}
                        >
                          <div
                            style={{
                              display: "flex",
                              justifyContent: "space-between",
                              alignItems: "center",
                            }}
                          >
                            <div>
                              <div style={{ fontWeight: 700 }}>
                                {cliente?.nombre || (
                                  <span style={{ color: "#475569" }}>
                                    Sin cliente
                                  </span>
                                )}
                              </div>
                              <div
                                style={{
                                  fontSize: "var(--text-xs)",
                                  color: "#64748b",
                                }}
                              >
                                {new Date(v.fecha).toLocaleTimeString("es", {
                                  hour: "2-digit",
                                  minute: "2-digit",
                                })}{" "}
                                · {sim ? simLabel(sim) : "—"}
                              </div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontWeight: 700 }}>
                                {v.cantidad} cr.
                              </div>
                              <div
                                style={{
                                  fontSize: "var(--text-xs)",
                                  color: "#64748b",
                                }}
                              >
                                ${Number(v.precio_venta).toFixed(2)}
                              </div>
                            </div>
                          </div>
                          <div
                            style={{
                              display: "flex",
                              justifyContent: "space-between",
                              alignItems: "center",
                            }}
                          >
                            <span
                              className={`badge ${v.estado_pago === "pagado" ? "badge-green" : "badge-yellow"}`}
                            >
                              {v.estado_pago}
                            </span>
                            <span
                              style={{
                                fontSize: "var(--text-sm)",
                                color: "#22c55e",
                                fontWeight: 600,
                              }}
                            >
                              +${Number(v.ganancia).toFixed(2)}
                            </span>
                            {v.estado_pago === "pendiente" && (
                              <button
                                className="btn btn-success btn-sm"
                                onClick={() => onCobrar(v)}
                                disabled={loading === v.id}
                              >
                                {loading === v.id ? (
                                  <span className="spinner" />
                                ) : (
                                  "✓ Cobrado"
                                )}
                              </button>
                            )}
                          </div>
                        </div>
                      );
                    })
                )}
              </div>
            )}
          </div>
        );
      }

      function Historial({ ventas, sims, clientes, onRefresh }) {
        const [vista, setVista] = useState("lista");
        const [filtro, setFiltro] = useState("todos");
        const [loading, setLoading] = useState(null);
        const [errCobro, setErrCobro] = useState("");

        const simsMap = useMemo(
          () => Object.fromEntries(sims.map((s) => [s.id, s])),
          [sims],
        );
        const clientesMap = useMemo(
          () => Object.fromEntries(clientes.map((c) => [c.id, c])),
          [clientes],
        );

        const filtradas = useMemo(
          () =>
            [...ventas]
              .filter((v) => filtro === "todos" || v.estado_pago === filtro)
              .sort((a, b) => new Date(b.fecha) - new Date(a.fecha)),
          [ventas, filtro],
        );

        async function cobrar(v) {
          setLoading(v.id);
          setErrCobro("");
          const { error } = await sb.rpc("marcar_pago", { p_venta_id: v.id });
          if (error) setErrCobro(error.message);
          else onRefresh();
          setLoading(null);
        }

        return (
          <div className="page">
            <div className="page-header">
              <span className="page-title">Historial</span>
              {/* Toggle lista / calendario */}
              <div
                style={{
                  display: "flex",
                  background: "#0f172a",
                  borderRadius: 8,
                  padding: 2,
                  gap: 2,
                }}
              >
                {[
                  ["lista", "☰"],
                  ["calendario", "📅"],
                ].map(([v, icon]) => (
                  <button
                    key={v}
                    onClick={() => setVista(v)}
                    style={{
                      padding: ".3rem .7rem",
                      borderRadius: 6,
                      border: "none",
                      cursor: "pointer",
                      fontSize: "var(--text-sm)",
                      fontWeight: 600,
                      background: vista === v ? "#334155" : "transparent",
                      color: vista === v ? "#e2e8f0" : "#64748b",
                      transition: ".15s",
                    }}
                  >
                    {icon}
                  </button>
                ))}
              </div>
            </div>
            {errCobro && <div className="alert alert-error">{errCobro}</div>}

            {/* Vista lista */}
            {vista === "lista" && (
              <>
                <div style={{ display: "flex", gap: ".4rem" }}>
                  {["todos", "pendiente", "pagado"].map((f) => (
                    <button
                      key={f}
                      onClick={() => setFiltro(f)}
                      style={{
                        padding: ".4rem .9rem",
                        borderRadius: "999px",
                        border: "1.5px solid",
                        fontSize: "var(--text-xs)",
                        cursor: "pointer",
                        fontWeight: 600,
                        borderColor: filtro === f ? "#38bdf8" : "#334155",
                        background: filtro === f ? "#0c2a4a" : "transparent",
                        color: filtro === f ? "#38bdf8" : "#64748b",
                      }}
                    >
                      {f.charAt(0).toUpperCase() + f.slice(1)}
                    </button>
                  ))}
                </div>
                {filtradas.map((v) => {
                  const cliente = v.cliente_id
                    ? clientesMap[v.cliente_id]
                    : null;
                  const sim = simsMap[v.sim_id];
                  return (
                    <div
                      key={v.id}
                      className="list-item"
                      style={{
                        flexDirection: "column",
                        gap: "var(--space-sm)",
                        alignItems: "stretch",
                      }}
                    >
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                        }}
                      >
                        <div>
                          <div style={{ fontWeight: 700 }}>
                            {cliente?.nombre || (
                              <span style={{ color: "#475569" }}>
                                Sin cliente
                              </span>
                            )}
                          </div>
                          <div
                            style={{
                              fontSize: "var(--text-xs)",
                              color: "#64748b",
                            }}
                          >
                            {new Date(v.fecha).toLocaleString("es", {
                              day: "numeric",
                              month: "short",
                              hour: "2-digit",
                              minute: "2-digit",
                            })}{" "}
                            · {sim ? simLabel(sim) : "—"}
                          </div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontWeight: 700 }}>
                            {v.cantidad} cr.
                          </div>
                          <div
                            style={{
                              fontSize: "var(--text-xs)",
                              color: "#64748b",
                            }}
                          >
                            ${Number(v.precio_venta).toFixed(2)}
                          </div>
                        </div>
                      </div>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                        }}
                      >
                        <span
                          className={`badge ${v.estado_pago === "pagado" ? "badge-green" : "badge-yellow"}`}
                        >
                          {v.estado_pago}
                        </span>
                        <span
                          style={{
                            fontSize: "var(--text-sm)",
                            color: "#22c55e",
                            fontWeight: 600,
                          }}
                        >
                          +${Number(v.ganancia).toFixed(2)}
                        </span>
                        {v.estado_pago === "pendiente" && (
                          <button
                            className="btn btn-success btn-sm"
                            onClick={() => cobrar(v)}
                            disabled={loading === v.id}
                          >
                            {loading === v.id ? (
                              <span className="spinner" />
                            ) : (
                              "✓ Cobrado"
                            )}
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
                {filtradas.length === 0 && (
                  <div className="empty">
                    Sin ventas{filtro !== "todos" ? " en este filtro" : ""}
                  </div>
                )}
              </>
            )}

            {/* Vista calendario */}
            {vista === "calendario" && (
              <CalendarioHistorial
                ventas={ventas}
                simsMap={simsMap}
                clientesMap={clientesMap}
                onCobrar={cobrar}
                loading={loading}
              />
            )}
          </div>
        );
      }

      // ── APP PRINCIPAL ─────────────────────────────────────────
      function App() {
        const [user, setUser] = useState(undefined);
        const [tab, setTab] = useState("dashboard");
        const [sims, setSims] = useState([]);
        const [lotesPorSim, setLotesPorSim] = useState({});
        const [clientes, setClientes] = useState([]);
        const [ventas, setVentas] = useState([]);
        const [config, setConfig] = useState(null);
        // FIX #3 — Flag de carga como ref con reset garantizado en finally
        const cargando = useRef(false);

        useEffect(() => {
          sb.auth
            .getSession()
            .then(({ data }) => setUser(data.session?.user ?? null));
          const {
            data: { subscription },
          } = sb.auth.onAuthStateChange((_, session) => {
            setUser(session?.user ?? null);
          });
          return () => subscription.unsubscribe();
        }, []);

        // FIX #3 — finally garantiza que el flag se libere siempre
        // FIX #10 — Función de carga completa
        const cargar = useCallback(async () => {
          if (cargando.current) return;
          cargando.current = true;
          try {
            const [
              { data: s },
              { data: l },
              { data: c },
              { data: v },
              { data: cfg },
            ] = await Promise.all([
              sb
                .from("sims")
                .select("*")
                .eq("activa", true)
                .order("created_at"),
              sb.from("lotes_saldo").select("*").order("fecha_compra"),
              sb.from("clientes").select("*").order("nombre"),
              sb
                .from("ventas")
                .select("*")
                .order("fecha", { ascending: false }),
              sb.from("configuracion").select("*").maybeSingle(),
            ]);
            setSims(s || []);
            const por_sim = {};
            (l || []).forEach((x) => {
              if (!por_sim[x.sim_id]) por_sim[x.sim_id] = [];
              por_sim[x.sim_id].push(x);
            });
            setLotesPorSim(por_sim);
            setClientes(c || []);
            setVentas(v || []);
            setConfig(cfg);
          } finally {
            // FIX #3 — siempre se libera el flag, incluso si hay error
            cargando.current = false;
          }
        }, []);

        useEffect(() => {
          if (user) cargar();
        }, [user, cargar]);

        async function logout() {
          await sb.auth.signOut();
          setUser(null);
          setSims([]);
          setLotesPorSim({});
          setClientes([]);
          setVentas([]);
          setConfig(null);
        }

        if (user === undefined)
          return (
            <div
              style={{
                display: "flex",
                justifyContent: "center",
                alignItems: "center",
                height: "100vh",
              }}
            >
              <span
                className="spinner"
                style={{ width: 32, height: 32, borderWidth: 3 }}
              />
            </div>
          );

        if (!user) return <Auth onAuth={setUser} />;

        const navItems = [
          {
            id: "dashboard",
            label: "Inicio",
            icon: (
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
              >
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
              </svg>
            ),
          },
          {
            id: "sims",
            label: "SIMs",
            icon: (
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
              >
                <rect x="5" y="2" width="14" height="20" rx="2" />
                <line x1="12" y1="18" x2="12.01" y2="18" />
              </svg>
            ),
          },
          {
            id: "ventas",
            label: "Vender",
            icon: (
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="16" />
                <line x1="8" y1="12" x2="16" y2="12" />
              </svg>
            ),
          },
          {
            id: "clientes",
            label: "Clientes",
            icon: (
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
              >
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
              </svg>
            ),
          },
          {
            id: "historial",
            label: "Historial",
            icon: (
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
              >
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
              </svg>
            ),
          },
        ];

        return (
          <div className="app">
            <div
              style={{
                flex: 1,
                overflowY: "auto",
                WebkitOverflowScrolling: "touch",
                display: "flex",
                flexDirection: "column",
              }}
            >
              {tab === "dashboard" && (
                <Dashboard
                  sims={sims}
                  ventas={ventas}
                  lotesPorSim={lotesPorSim}
                  clientes={clientes}
                  config={config}
                  onVender={() => setTab("ventas")}
                />
              )}
              {tab === "sims" && (
                <Sims
                  sims={sims}
                  lotesPorSim={lotesPorSim}
                  userId={user.id}
                  onRefresh={cargar}
                />
              )}
              {tab === "ventas" && (
                <Ventas
                  sims={sims}
                  clientes={clientes}
                  lotesPorSim={lotesPorSim}
                  config={config}
                  userId={user.id}
                  onRefresh={cargar}
                />
              )}
              {tab === "clientes" && (
                <Clientes
                  clientes={clientes}
                  config={config}
                  userId={user.id}
                  onRefresh={cargar}
                />
              )}
              {tab === "historial" && (
                <Historial
                  ventas={ventas}
                  sims={sims}
                  clientes={clientes}
                  onRefresh={cargar}
                />
              )}
            </div>
            <div>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  padding: "var(--space-xs) var(--space-md)",
                  background: "#0f172a",
                  borderTop: "1px solid #1e293b",
                }}
              >
                <span style={{ fontSize: "var(--text-xs)", color: "#475569" }}>
                  {user.email}
                </span>
                <button
                  onClick={logout}
                  style={{
                    background: "none",
                    border: "none",
                    color: "#64748b",
                    fontSize: "var(--text-xs)",
                    cursor: "pointer",
                  }}
                >
                  Cerrar sesión
                </button>
              </div>
              <nav className="nav">
                {navItems.map((n) => (
                  <button
                    key={n.id}
                    className={`nav-item ${tab === n.id ? "active" : ""}`}
                    onClick={() => setTab(n.id)}
                  >
                    {n.icon}
                    {n.label}
                  </button>
                ))}
              </nav>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
