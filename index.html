            </div>
          </div>
        );
      }

      function ModalRiesgoAlto({ cliente, onConfirmar, onCancelar }) {
        return (
          <div className="riesgo-overlay">
            <div className="riesgo-card">
              <div style={{ fontSize: "1.3rem", fontWeight: 800, color: "#ef4444" }}>
                ⚠️ Cliente de riesgo alto
              </div>
              <div style={{ fontSize: ".9rem", color: "#94a3b8" }}>
                <strong style={{ color: "#e2e8f0" }}>{cliente.nombre}</strong> tiene un perfil de riesgo alto
                {cliente.deuda_total > 0 && (
                  <span> y una deuda pendiente de <strong style={{ color: "#fbbf24" }}>${Number(cliente.deuda_total).toFixed(2)}</strong></span>
                )}.
              </div>
              <div style={{ fontSize: ".82rem", color: "#64748b" }}>¿Deseas continuar con esta venta de todas formas?</div>
              <div style={{ display: "flex", gap: ".6rem", marginTop: ".3rem" }}>
                <button className="btn btn-secondary" onClick={onCancelar}>Cancelar</button>
                <button className="btn btn-danger" onClick={onConfirmar}>Continuar de todas formas</button>
              </div>
            </div>
          </div>
        );
      }

      // ── PANEL POTENCIAL ───────────────────────────────────────
      function PanelPotencial({ sims, lotesPorSim, config, onClose }) {
        const [tipo, setTipo] = useState(240);
        const [precio, setPrecio] = useState("");
        const [meta, setMeta] = useState("");
        const [verSims, setVerSims] = useState(false);
        const [verMeta, setVerMeta] = useState(false);

        const costo_op = config?.costo_operativo || 5;
        const getMargenes = (t) =>
          config?.[`margen_tipo_${t}`] ?? { 120: 25, 240: 20, 360: 15 }[t] ?? 20;

        function calcularSim(sim, t) {
          const lotes = lotesPorSim[sim.id] || [];
          const cpp = cppSim(lotes);
          const costo_real = +(cpp * t).toFixed(4);
          const precio_sugerido = +(costo_real * (1 + getMargenes(t) / 100)).toFixed(2);
          const precio_minimo = +(costo_real + costo_op).toFixed(2);
          const precio_usado = parseFloat(precio) || precio_sugerido;
          const ganancia_unitaria = +(precio_usado - costo_real - costo_op).toFixed(2);
          const recargas_por_saldo = cpp > 0 ? Math.floor(sim.saldo_disponible / (cpp * t)) : 0;
          const recargas_hoy = Math.min(recargas_por_saldo, sim.recargas_restantes);
          const ganancia_hoy = +(ganancia_unitaria * recargas_hoy).toFixed(2);
          const sin_lotes = lotes.length === 0;
          return { cpp, costo_real, precio_sugerido, precio_minimo, ganancia_unitaria, recargas_por_saldo, recargas_hoy, ganancia_hoy, sin_lotes };
        }

        const simsActivas = sims.filter((s) => s.activa);

        function totalEscenario(t) {
          return simsActivas.reduce(
            (acc, sim) => {
              const d = calcularSim(sim, t);
              const bruta_unitaria = +((parseFloat(precio) || d.precio_sugerido) - d.costo_real).toFixed(2);
              const bruta_hoy = +(bruta_unitaria * d.recargas_hoy).toFixed(2);
              const costo_total_hoy = +(costo_op * d.recargas_hoy).toFixed(2);
              return {
                recargas: acc.recargas + d.recargas_hoy,
                ganancia: +(acc.ganancia + d.ganancia_hoy).toFixed(2),
                bruta: +(acc.bruta + bruta_hoy).toFixed(2),
                costo_op_total: +(acc.costo_op_total + costo_total_hoy).toFixed(2),
              };
            },
            { recargas: 0, ganancia: 0, bruta: 0, costo_op_total: 0 },
          );
        }

        const escenarios = [120, 240, 360].map((t) => ({ tipo: t, ...totalEscenario(t) }));
        const mejor =
          escenarios.length > 0
            ? escenarios.reduce((a, b) => (b.ganancia > a.ganancia ? b : a))
            : { tipo: 240, recargas: 0, ganancia: 0 };

        const precioMinimo =
          simsActivas.length > 0
            ? Math.max(...simsActivas.map((s) => calcularSim(s, tipo).precio_minimo))
            : 0;
        const precioSugeridoGlobal =
          simsActivas.length > 0
            ? Math.max(...simsActivas.map((s) => calcularSim(s, tipo).precio_sugerido))
            : 0;
        const precioUsado = parseFloat(precio) || precioSugeridoGlobal;
        const aPerdia = precioUsado < precioMinimo;
        const totalActual = totalEscenario(tipo);

        function getLimitante() {
          const totalSaldo = simsActivas.reduce((s, sim) => s + calcularSim(sim, tipo).recargas_por_saldo, 0);
          const totalHoy = simsActivas.reduce((s, sim) => s + sim.recargas_restantes, 0);
          if (totalSaldo === 0 && totalHoy === 0) return { tipo: "gris", msg: "Sin capacidad hoy" };
          if (totalHoy === 0) return { tipo: "gris", msg: "Recargas del día agotadas" };
          if (totalSaldo === 0) return { tipo: "rojo", msg: "Limitante: saldo insuficiente" };
          if (totalHoy < totalSaldo) return { tipo: "amarillo", msg: "Limitante: recargas del día" };
          return { tipo: "verde", msg: "Sin limitantes hoy" };
        }
        const limitante = getLimitante();
        const iconLimitante = { verde: "🟢", amarillo: "🟡", rojo: "🔴", gris: "⚫" };

        const metaNum = parseFloat(meta) || 0;
        const gananciaUnitaria = totalActual.recargas > 0 ? totalActual.ganancia / totalActual.recargas : 0;
        const recargasParaMeta = gananciaUnitaria > 0 ? Math.ceil(metaNum / gananciaUnitaria) : 0;
        const recargasDisponibles = totalActual.recargas;
        const faltanRecargas = Math.max(recargasParaMeta - recargasDisponibles, 0);
        const gananciaPosible = +(gananciaUnitaria * recargasDisponibles).toFixed(2);
        const faltaDinero = +(metaNum - gananciaPosible).toFixed(2);

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span className="modal-title">💰 Simulador de potencial</span>
                <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", fontSize: "1.2rem", cursor: "pointer" }}>✕</button>
              </div>

              <div style={{ background: "#0c2a4a", borderRadius: 10, padding: "1rem", border: "1px solid #1e4a6e" }}>
                <div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginBottom: "var(--space-xs)" }}>MEJOR ESCENARIO HOY</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontWeight: 800, fontSize: "1.1rem", color: "#38bdf8" }}>Recargas de {mejor.tipo} cr.</div>
                    <div style={{ fontSize: "var(--text-sm)", color: "#94a3b8", marginTop: ".2rem" }}>
                      {mejor.recargas} recargas · ${mejor.ganancia.toFixed(2)} ganancia
                    </div>
                  </div>
                  <div style={{ fontSize: "1.5rem" }}>✨</div>
                </div>
                <div className={`limitante ${limitante.tipo}`}>{iconLimitante[limitante.tipo]} {limitante.msg}</div>
              </div>

              <div>
                <div className="section-title" style={{ marginBottom: "var(--space-sm)" }}>Simular por tipo</div>
                <div style={{ display: "flex", gap: "var(--space-sm)" }}>
                  {[120, 240, 360].map((t) => (
                    <button key={t} className={`tipo-tab ${tipo === t ? "active" : ""}`} onClick={() => { setTipo(t); setPrecio(""); }}>
                      {t} cr.
                    </button>
                  ))}
                </div>
              </div>

              <div className="form-group">
                <label>Precio de venta</label>
                <input type="number" value={precio} onChange={(e) => setPrecio(e.target.value)} placeholder={`Sugerido: ${precioSugeridoGlobal.toFixed(2)}`} />
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: "var(--text-xs)", marginTop: "var(--space-xs)" }}>
                  <span style={{ color: "#64748b" }}>Mínimo sin pérdida: <strong style={{ color: "#f87171" }}>${precioMinimo.toFixed(2)}</strong></span>
                  {aPerdia && <span style={{ color: "#ef4444", fontWeight: 700 }}>⚠️ A pérdida</span>}
                </div>
              </div>

              <div>
                <div className="section-title" style={{ marginBottom: ".4rem" }}>Comparar escenarios</div>
                <div style={{ background: "#0f172a", borderRadius: 10, padding: "var(--space-md)", border: "1px solid #1e293b" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "52px 1fr 1fr 1fr", gap: ".3rem", fontSize: ".62rem", color: "#475569", textTransform: "uppercase", letterSpacing: ".03em", marginBottom: "var(--space-xs)", paddingBottom: "var(--space-xs)", borderBottom: "1px solid #1e293b" }}>
                    <span>Tipo</span><span>Recargas</span><span>G. bruta</span><span style={{ textAlign: "right" }}>Utilidad</span>
                  </div>
                  {escenarios.map((e) => {
                    const esBest = e.tipo === mejor.tipo;
                    return (
                      <div key={e.tipo} className={`escenario-row ${esBest ? "best" : ""}`} style={{ cursor: "pointer" }} onClick={() => { setTipo(e.tipo); setPrecio(""); }}>
                        <div className="escenario-cell">
                          <span className="escenario-val" style={{ color: esBest ? "#38bdf8" : "#e2e8f0" }}>{e.tipo} cr.</span>
                          {esBest && <span style={{ fontSize: ".6rem", color: "#38bdf8" }}>✨ mejor</span>}
                        </div>
                        <div className="escenario-cell">
                          <span className="escenario-val" style={{ color: "#94a3b8" }}>{e.recargas}</span>
                          <span className="escenario-lbl">recargas</span>
                        </div>
                        <div className="escenario-cell">
                          <span className="escenario-val" style={{ color: "#fbbf24" }}>${e.bruta.toFixed(2)}</span>
                          <span className="escenario-lbl">sin op.</span>
                        </div>
                        <div className="escenario-cell" style={{ alignItems: "flex-end" }}>
                          <span className="escenario-val" style={{ color: esBest ? "#22c55e" : e.ganancia >= 0 ? "#86efac" : "#f87171" }}>${e.ganancia.toFixed(2)}</span>
                          <span className="escenario-lbl" style={{ textAlign: "right" }}>utilidad</span>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ marginTop: "var(--space-sm)", paddingTop: "var(--space-sm)", borderTop: "1px solid #1e293b", fontSize: ".65rem", color: "#475569", display: "flex", gap: "1rem" }}>
                    <span>G. bruta = precio − costo saldo</span>
                    <span>Utilidad = bruta − op. (${costo_op}/recarga)</span>
                  </div>
                </div>
              </div>

              <div style={{ background: "#064e3b", borderRadius: 10, padding: ".9rem", border: "1px solid #166534", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: "var(--text-xs)", color: "#86efac" }}>CON {tipo} CR. AL PRECIO ACTUAL</div>
                  <div style={{ fontWeight: 800, fontSize: "1.1rem", color: "#22c55e", marginTop: ".2rem" }}>${totalActual.ganancia.toFixed(2)}</div>
                </div>
                <div style={{ textAlign: "right", fontSize: "var(--text-sm)", color: "#86efac" }}>
                  <div>{totalActual.recargas} recargas</div>
                  <div style={{ fontSize: "var(--text-xs)", color: "#34d399", marginTop: ".1rem" }}>posibles hoy</div>
                </div>
              </div>

              <div>
                <button className="collapse-btn" onClick={() => setVerSims((v) => !v)}>
                  {verSims ? "▼" : "▶"} Desglose por SIM
                </button>
                {verSims && simsActivas.map((sim) => {
                  const d = calcularSim(sim, tipo);
                  return (
                    <div key={sim.id} className="sim-detalle">
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontWeight: 700, color: "#38bdf8" }}>📱 {simLabel(sim)}</div>
                          <div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginTop: ".2rem" }}>
                            {Number(sim.saldo_disponible).toLocaleString()} cr. · cpp ${d.cpp.toFixed(4)}
                          </div>
                          {d.sin_lotes && <div style={{ fontSize: "var(--text-xs)", color: "#fbbf24", marginTop: ".2rem" }}>⚠️ Sin lotes — costo desconocido</div>}
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontWeight: 700, color: "#22c55e" }}>${d.ganancia_hoy.toFixed(2)}</div>
                          <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>{d.recargas_hoy} hoy / {d.recargas_por_saldo} total</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div>
                <button className="collapse-btn" onClick={() => setVerMeta((v) => !v)}>
                  {verMeta ? "▼" : "▶"} Calcular meta diaria
                </button>
                {verMeta && (
                  <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-md)", marginTop: ".4rem" }}>
                    <div className="form-group">
                      <label>Quiero ganar ($)</label>
                      <input type="number" value={meta} onChange={(e) => setMeta(e.target.value)} placeholder="Ej: 200" />
                    </div>
                    {metaNum > 0 && (
                      <div style={{ background: "#0f172a", borderRadius: 10, padding: "1rem", border: "1px solid #1e293b", display: "flex", flexDirection: "column", gap: "var(--space-sm)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: "var(--text-sm)" }}>
                          <span style={{ color: "#64748b" }}>Recargas necesarias</span>
                          <span style={{ fontWeight: 700 }}>{recargasParaMeta} de {tipo} cr.</span>
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: "var(--text-sm)" }}>
                          <span style={{ color: "#64748b" }}>Recargas disponibles hoy</span>
                          <span style={{ fontWeight: 700, color: recargasDisponibles >= recargasParaMeta ? "#22c55e" : "#fbbf24" }}>{recargasDisponibles}</span>
                        </div>
                        {faltanRecargas > 0 ? (
                          <>
                            <div className="divider" />
                            <div style={{ fontSize: "var(--text-sm)", color: "#fbbf24" }}>⚠️ Te faltan {faltanRecargas} recargas para alcanzar tu meta</div>
                            <div style={{ fontSize: "var(--text-sm)", color: "#fbbf24" }}>Con lo disponible ganarías ${gananciaPosible.toFixed(2)} (faltan ${faltaDinero.toFixed(2)})</div>
                          </>
                        ) : (
                          <div style={{ fontSize: "var(--text-sm)", color: "#22c55e", fontWeight: 700 }}>✅ Puedes alcanzar tu meta hoy</div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      function FormNuevoCliente({ userId, onCreado, onCancelar }) {
        const [nombre, setNombre] = useState("");
        const [tel, setTel] = useState("");
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");

        async function crear() {
          if (!nombre.trim()) return setErr("Ingresa el nombre");
          setLoading(true);
          setErr("");
          const { data, error } = await sb.from("clientes").insert({ nombre: nombre.trim(), telefono: tel || null, user_id: userId }).select().single();
          if (error) { setErr(error.message); setLoading(false); return; }
          onCreado(data);
          setLoading(false);
        }

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-md)" }}>
            {err && <div className="alert alert-error">{err}</div>}
            <div className="form-group">
              <label>Nombre</label>
              <input value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Nombre del cliente" autoFocus />
            </div>
            <div className="form-group">
              <label>Teléfono (opcional)</label>
              <input value={tel} onChange={(e) => setTel(e.target.value)} placeholder="+52 555 000 0000" />
            </div>
            <div style={{ display: "flex", gap: ".6rem" }}>
              <button className="btn btn-secondary" onClick={onCancelar}>Cancelar</button>
              <button className="btn btn-primary" onClick={crear} disabled={loading}>{loading ? <span className="spinner" /> : "Guardar"}</button>
            </div>
          </div>
        );
      }

      // ── AUTH ──────────────────────────────────────────────────
      function Auth({ onAuth }) {
        const [tab, setTab] = useState("login");
        const [email, setEmail] = useState("");
        const [pass, setPass] = useState("");
        const [err, setErr] = useState("");
        const [loading, setLoading] = useState(false);
        const [ok, setOk] = useState("");

        async function submit() {
          setErr(""); setOk(""); setLoading(true);
          if (tab === "login") {
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) setErr(error.message);
            else onAuth(data.session?.user ?? data.user);
          } else {
            const { error } = await sb.auth.signUp({ email, password: pass });
            if (error) setErr(error.message);
            else setOk("Cuenta creada. Ya puedes entrar.");
          }
          setLoading(false);
        }

        return (
          <div className="auth">
            <div className="auth-logo">
              <h1>📶 ReventaSaldo</h1>
              <p>Gestión inteligente de saldo móvil</p>
            </div>
            <div className="auth-tabs">
              <button className={`auth-tab ${tab === "login" ? "active" : ""}`} onClick={() => setTab("login")}>Entrar</button>
              <button className={`auth-tab ${tab === "register" ? "active" : ""}`} onClick={() => setTab("register")}>Registrarse</button>
            </div>
            {err && <div className="alert alert-error">{err}</div>}
            {ok && <div className="alert alert-success">{ok}</div>}
            <div className="form-group">
              <label>Correo</label>
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="correo@ejemplo.com" autoComplete="email" onKeyDown={(e) => e.key === "Enter" && submit()} />
            </div>
            <div className="form-group">
              <label>Contraseña</label>
              <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} placeholder="••••••••" autoComplete={tab === "login" ? "current-password" : "new-password"} onKeyDown={(e) => e.key === "Enter" && submit()} />
            </div>
            <button className="btn btn-primary" onClick={submit} disabled={loading}>
              {loading ? <span className="spinner" /> : tab === "login" ? "Entrar" : "Crear cuenta"}
            </button>
          </div>
        );
      }

      // ── DASHBOARD ─────────────────────────────────────────────
      function Dashboard({ sims, ventas, lotesPorSim, clientes, config, onVender }) {
        const [panelPotencial, setPanelPotencial] = useState(false);

        const saldo_total = sims.reduce((s, sim) => s + Number(sim.saldo_disponible), 0);
        const ganancia_total = ventas.filter((v) => v.estado_pago === "pagado").reduce((s, v) => s + Number(v.ganancia), 0);
        const ganancia_hoy = ventas.filter((v) => v.estado_pago === "pagado" && esHoy(v.fecha)).reduce((s, v) => s + Number(v.ganancia), 0);
        const pendiente = ventas.filter((v) => v.estado_pago === "pendiente").reduce((s, v) => s + Number(v.precio_venta), 0);
        const recargas_hoy = sims.reduce((s, sim) => s + sim.recargas_restantes, 0);

        const riesgosMap = useMemo(
          () => Object.fromEntries(clientes.map((c) => [c.id, calcularRiesgo(c, config)])),
          [clientes, config],
        );
        const en_riesgo = clientes.filter((c) => riesgosMap[c.id]?.nivel === "alto").length;
        const recientes = useMemo(() => [...ventas].sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).slice(0, 5), [ventas]);
        const clientesMap = useMemo(() => Object.fromEntries(clientes.map((c) => [c.id, c])), [clientes]);
        const simsMap = useMemo(() => Object.fromEntries(sims.map((s) => [s.id, s])), [sims]);

        const maxGanancia = useMemo(() => {
          const simsActivas = sims.filter((s) => s.activa);
          if (simsActivas.length === 0) return 0;
          const ganancias = [120, 240, 360].map((t) =>
            simsActivas.reduce((acc, sim) => {
              const lotes = lotesPorSim[sim.id] || [];
              const cpp = cppSim(lotes);
              const cr = +(cpp * t).toFixed(4);
              const ps = +(cr * (1 + (config?.[`margen_tipo_${t}`] || 20) / 100)).toFixed(2);
              const gu = +(ps - cr - (config?.costo_operativo || 5)).toFixed(2);
              const rh = Math.min(cpp > 0 ? Math.floor(sim.saldo_disponible / (cpp * t)) : 0, sim.recargas_restantes);
              return acc + gu * rh;
            }, 0),
          );
          return Math.max(0, ...ganancias);
        }, [sims, lotesPorSim, config]);

        return (
          <div className="page">
            <div className="page-header">
              <span className="page-title">Dashboard</span>
              <span style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>
                {new Date().toLocaleDateString("es", { weekday: "short", day: "numeric", month: "short" })}
              </span>
            </div>
            <div className="card-grid">
              <div className="metric"><div className="metric-label">Saldo total</div><div className="metric-value blue">{saldo_total.toLocaleString()}</div><div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginTop: ".2rem" }}>créditos</div></div>
              <div className="metric"><div className="metric-label">Ganancia hoy</div><div className="metric-value green">${ganancia_hoy.toFixed(2)}</div></div>
              <div className="metric"><div className="metric-label">Ganancia total</div><div className="metric-value green">${ganancia_total.toFixed(2)}</div></div>
              <div className="metric"><div className="metric-label">Por cobrar</div><div className="metric-value yellow">${pendiente.toFixed(2)}</div></div>
              <div className="metric"><div className="metric-label">Recargas hoy</div><div className="metric-value blue">{recargas_hoy}</div><div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginTop: ".2rem" }}>disponibles</div></div>
              <div className="metric"><div className="metric-label">Clientes riesgo</div><div className={`metric-value ${en_riesgo > 0 ? "red" : "green"}`}>{en_riesgo}</div></div>
            </div>

            <div className="potencial-card" onClick={() => setPanelPotencial(true)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: "var(--text-base)" }}>💰 ¿Cuánto puedo ganar hoy?</div>
                  <div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginTop: ".2rem" }}>Toca para abrir el simulador</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: "1.2rem", fontWeight: 800, color: "#22c55e" }}>${maxGanancia.toFixed(2)}</div>
                  <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>máximo posible</div>
                </div>
              </div>
            </div>

            {panelPotencial && <PanelPotencial sims={sims} lotesPorSim={lotesPorSim} config={config} onClose={() => setPanelPotencial(false)} />}

            <div className="section-title">Ventas recientes</div>
            {recientes.map((v) => {
              const cliente = v.cliente_id ? clientesMap[v.cliente_id] : null;
              const sim = simsMap[v.sim_id];
              return (
                <div key={v.id} style={{ background: "#0f172a", borderRadius: 10, padding: ".8rem 1rem", border: "1px solid #1e293b", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: "var(--text-base)" }}>{cliente?.nombre || "👤 Sin cliente"}</div>
                    <div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginTop: ".15rem" }}>
                      {simLabel(sim)} · {new Date(v.fecha).toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" })}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontWeight: 700 }}>{v.cantidad} cr.</div>
                    <div style={{ fontSize: "var(--text-sm)", color: v.estado_pago === "pagado" ? "#22c55e" : "#fbbf24" }}>
                      {v.estado_pago === "pagado" ? `+$${Number(v.ganancia).toFixed(2)}` : `$${Number(v.precio_venta).toFixed(2)} pend.`}
                    </div>
                  </div>
                </div>
              );
            })}

            <div className="section-title">SIMs activas</div>
            {sims.filter((s) => s.activa).map((sim) => {
              const dots = Array.from({ length: sim.limite_diario }, (_, i) => i < sim.recargas_restantes);
              return (
                <div key={sim.id} className="sim-card">
                  <div className="sim-name">📱 {simLabel(sim)}</div>
                  {sim.nombre && <div className="sim-number">{sim.numero}</div>}
                  <div className="sim-stats">
                    <div className="sim-stat"><div className="sim-stat-val blue">{Number(sim.saldo_disponible).toLocaleString()}</div><div className="sim-stat-label">créditos</div></div>
                    <div className="sim-stat"><div className="sim-stat-val">{sim.recargas_restantes}/{sim.limite_diario}</div><div className="sim-stat-label">recargas hoy</div></div>
                    <div className="sim-stat"><div className="sim-stat-val">{sim.uso_total}</div><div className="sim-stat-label">total ventas</div></div>
                  </div>
                  <div className="recargas-bar">{dots.map((u, i) => <div key={i} className={`recarga-dot ${u ? "used" : ""}`} />)}</div>
                </div>
              );
            })}
            {sims.filter((s) => s.activa).length === 0 && <div className="empty">Sin SIMs registradas</div>}

            <button className="fab" onClick={onVender}>⚡</button>
          </div>
        );
      }

      // ── SIMS ──────────────────────────────────────────────────
      function Sims({ sims, lotesPorSim, userId, onRefresh }) {
        const [modalSim, setModalSim] = useState(false);
        const [editSim, setEditSim] = useState(null);
        const [confirmarElim, setConfirmarElim] = useState(null);
        const [modalLote, setModalLote] = useState(null);
        const [nombre, setNombre] = useState("");
        const [numero, setNumero] = useState("");
        const [limiteDiario, setLimiteDiario] = useState("3");
        const [cantidad, setCantidad] = useState("");
        const [costo, setCosto] = useState("");
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");

        function abrirNueva() { setEditSim(null); setNombre(""); setNumero(""); setLimiteDiario("3"); setErr(""); setModalSim(true); }
        function abrirEditar(sim) { setEditSim(sim); setNombre(sim.nombre || ""); setNumero(sim.numero || ""); setLimiteDiario(String(sim.limite_diario || 3)); setErr(""); setModalSim(true); }

        async function guardarSim() {
          if (!numero.trim()) return setErr("Ingresa el número");
          setLoading(true); setErr("");
          if (editSim) {
            const { error } = await sb.from("sims").update({ numero: numero.trim(), nombre: nombre.trim() || null, limite_diario: Number(limiteDiario) || 3 }).eq("id", editSim.id);
            if (error) { setErr(error.message); setLoading(false); return; }
          } else {
            const ld = Number(limiteDiario) || 3;
            const { error } = await sb.from("sims").insert({ numero: numero.trim(), nombre: nombre.trim() || null, user_id: userId, limite_diario: ld, recargas_restantes: ld });
            if (error) { setErr(error.message); setLoading(false); return; }
          }
          setModalSim(false); onRefresh(); setLoading(false);
        }

        async function eliminarSim() {
          if (!confirmarElim) return;
          setLoading(true);
          const { error } = await sb.from("sims").update({ activa: false }).eq("id", confirmarElim.id);
          setConfirmarElim(null); setLoading(false);
          if (!error) onRefresh();
        }

        async function cargarLote() {
          if (!cantidad || !costo) return setErr("Completa todos los campos");
          setLoading(true); setErr("");
          const { error } = await sb.rpc("cargar_lote", { p_sim_id: modalLote.id, p_cantidad: Number(cantidad), p_costo_total: Number(costo) });
          if (error) { setErr(error.message); setLoading(false); return; }
          setModalLote(null); setCantidad(""); setCosto(""); onRefresh(); setLoading(false);
        }

        return (
          <div className="page">
            <div className="page-header">
              <span className="page-title">Mis SIMs</span>
              <button className="btn btn-primary btn-sm" onClick={abrirNueva}>+ SIM</button>
            </div>
            {sims.map((sim) => {
              const lotes = lotesPorSim[sim.id] || [];
              const cpp = cppSim(lotes);
              const dots = Array.from({ length: sim.limite_diario }, (_, i) => i < sim.recargas_restantes);
              return (
                <div key={sim.id} className="sim-card">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div className="sim-name">📱 {simLabel(sim)}</div>
                      {sim.nombre && <div className="sim-number">{sim.numero}</div>}
                    </div>
                    <div style={{ display: "flex", gap: ".4rem" }}>
                      <button className="btn btn-secondary btn-sm" onClick={() => { setModalLote(sim); setErr(""); }}>+ Saldo</button>
                      <button className="btn btn-secondary btn-sm" onClick={() => abrirEditar(sim)}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={() => setConfirmarElim(sim)}>🗑</button>
                    </div>
                  </div>
                  <div className="sim-stats">
                    <div className="sim-stat"><div className="sim-stat-val blue">{Number(sim.saldo_disponible).toLocaleString()}</div><div className="sim-stat-label">créditos</div></div>
                    <div className="sim-stat"><div className="sim-stat-val">{sim.recargas_restantes}/{sim.limite_diario}</div><div className="sim-stat-label">recargas hoy</div></div>
                    <div className="sim-stat"><div className="sim-stat-val">{cpp > 0 ? `$${cpp.toFixed(4)}` : "—"}</div><div className="sim-stat-label">costo/créd.</div></div>
                  </div>
                  <div className="recargas-bar">{dots.map((u, i) => <div key={i} className={`recarga-dot ${u ? "used" : ""}`} />)}</div>
                  {lotes.length === 0 && <div className="alert alert-warning" style={{ marginTop: "var(--space-md)", fontSize: "var(--text-xs)" }}>⚠️ Sin lotes cargados — el costo de venta es desconocido</div>}
                  {lotes.length > 0 && (
                    <div style={{ marginTop: "var(--space-md)" }}>
                      <div className="section-title" style={{ marginBottom: ".4rem" }}>Lotes cargados</div>
                      {lotes.map((l) => (
                        <div key={l.id} style={{ display: "flex", justifyContent: "space-between", fontSize: "var(--text-xs)", color: "#94a3b8", padding: "var(--space-xs) 0", borderBottom: "1px solid #1e293b" }}>
                          <span>{new Date(l.fecha_compra).toLocaleDateString("es")}</span>
                          <span>{Number(l.cantidad).toLocaleString()} cr.</span>
                          <span>${Number(l.costo_total).toFixed(2)}</span>
                          <span style={{ color: "#64748b" }}>${Number(l.costo_unitario).toFixed(4)}/cr</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
            {sims.length === 0 && <div className="empty">No tienes SIMs registradas.<br />Agrega tu primera SIM.</div>}

            {modalSim && (
              <Modal title={editSim ? "Editar SIM" : "Nueva SIM"} onClose={() => setModalSim(false)}>
                {err && <div className="alert alert-error">{err}</div>}
                <div className="form-group"><label>Nombre (opcional)</label><input value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Ej: SIM Telcel, SIM principal" /></div>
                <div className="form-group"><label>Número</label><input value={numero} onChange={(e) => setNumero(e.target.value)} placeholder="+52 555 000 0000" /></div>
                <div className="form-group"><label>Límite diario de recargas</label><input type="number" value={limiteDiario} onChange={(e) => setLimiteDiario(e.target.value)} placeholder="3" min="1" max="20" /></div>
                <button className="btn btn-primary" onClick={guardarSim} disabled={loading}>{loading ? <span className="spinner" /> : editSim ? "Guardar cambios" : "Guardar SIM"}</button>
              </Modal>
            )}

            {modalLote && (
              <Modal title={`Cargar saldo — ${simLabel(modalLote)}`} onClose={() => setModalLote(null)}>
                {err && <div className="alert alert-error">{err}</div>}
                <div className="form-group"><label>Créditos comprados</label><input type="number" value={cantidad} onChange={(e) => setCantidad(e.target.value)} placeholder="Ej: 1000" /></div>
                <div className="form-group"><label>Dinero pagado ($)</label><input type="number" value={costo} onChange={(e) => setCosto(e.target.value)} placeholder="Ej: 85.00" /></div>
                {cantidad && costo && Number(cantidad) > 0 && <div className="alert alert-success">Costo unitario: ${(Number(costo) / Number(cantidad)).toFixed(4)} por crédito</div>}
                <button className="btn btn-primary" onClick={cargarLote} disabled={loading}>{loading ? <span className="spinner" /> : "Cargar saldo"}</button>
              </Modal>
            )}

            {confirmarElim && (
              <div className="riesgo-overlay">
                <div className="riesgo-card">
                  <div style={{ fontSize: "1.1rem", fontWeight: 800, color: "#ef4444" }}>🗑 Eliminar SIM</div>
                  <div style={{ fontSize: "var(--text-base)", color: "#94a3b8" }}>
                    ¿Eliminar <strong style={{ color: "#e2e8f0" }}>{simLabel(confirmarElim)}</strong>? La SIM se marcará como inactiva y no aparecerá en nuevas ventas. El historial se conserva.
                  </div>
                  <div style={{ display: "flex", gap: ".6rem", marginTop: ".3rem" }}>
                    <button className="btn btn-secondary" onClick={() => setConfirmarElim(null)}>Cancelar</button>
                    <button className="btn btn-danger" onClick={eliminarSim} disabled={loading}>{loading ? <span className="spinner" /> : "Sí, eliminar"}</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── CLIENTES ──────────────────────────────────────────────
      function Clientes({ clientes, config, userId, onRefresh }) {
        const [modal, setModal] = useState(false);
        const [editCliente, setEditCliente] = useState(null);
        const [confirmarElim, setConfirmarElim] = useState(null);
        const [buscar, setBuscar] = useState("");
        const [nombre, setNombre] = useState("");
        const [tel, setTel] = useState("");
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");

        const riesgosMap = useMemo(
          () => Object.fromEntries(clientes.map((c) => [c.id, calcularRiesgo(c, config)])),
          [clientes, config],
        );

        const filtrados = clientes.filter(
          (c) => c.nombre.toLowerCase().includes(buscar.toLowerCase()) || (c.telefono || "").includes(buscar),
        );
        const nivelColor = { bajo: "badge-green", medio: "badge-yellow", alto: "badge-red" };

        function abrirNuevo() { setEditCliente(null); setNombre(""); setTel(""); setErr(""); setModal(true); }
        function abrirEditar(c) { setEditCliente(c); setNombre(c.nombre); setTel(c.telefono || ""); setErr(""); setModal(true); }

        async function guardar() {
          if (!nombre.trim()) return setErr("Ingresa el nombre");
          setLoading(true); setErr("");
          if (editCliente) {
            const { error } = await sb.from("clientes").update({ nombre: nombre.trim(), telefono: tel.trim() || null }).eq("id", editCliente.id);
            if (error) { setErr(error.message); setLoading(false); return; }
          } else {
            const { error } = await sb.from("clientes").insert({ nombre: nombre.trim(), telefono: tel.trim() || null, user_id: userId });
            if (error) { setErr(error.message); setLoading(false); return; }
          }
          setModal(false); onRefresh(); setLoading(false);
        }

        async function eliminar() {
          if (!confirmarElim) return;
          setLoading(true);
          const { error } = await sb.from("clientes").delete().eq("id", confirmarElim.id);
          setConfirmarElim(null); setLoading(false);
          if (!error) onRefresh();
        }

        return (
          <div className="page">
            <div className="page-header">
              <span className="page-title">Clientes</span>
              <button className="btn btn-primary btn-sm" onClick={abrirNuevo}>+ Cliente</button>
            </div>
            <input value={buscar} onChange={(e) => setBuscar(e.target.value)} placeholder="🔍 Buscar..." />
            {filtrados.map((c) => {
              const { nivel } = riesgosMap[c.id] || calcularRiesgo(c, config);
              return (
                <div key={c.id} className="list-item">
                  <div style={{ width: 40, height: 40, borderRadius: "50%", background: "#1e293b", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem", flexShrink: 0 }}>
                    {c.nombre.charAt(0).toUpperCase()}
                  </div>
                  <div className="list-item-info">
                    <div className="list-item-title">{c.nombre}</div>
                    <div className="list-item-sub">{c.telefono || "Sin teléfono"} · {c.total_compras} compras</div>
                  </div>
                  <div style={{ textAlign: "right", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: ".3rem" }}>
                    {c.deuda_total > 0 && <div style={{ color: "#fbbf24", fontWeight: 700, fontSize: "var(--text-base)" }}>${Number(c.deuda_total).toFixed(2)}</div>}
                    <span className={`badge ${nivelColor[nivel]}`}>{nivel}</span>
                    <div style={{ display: "flex", gap: ".3rem", marginTop: ".2rem" }}>
                      <button className="btn btn-secondary btn-sm" style={{ padding: ".3rem .5rem", minHeight: 28 }} onClick={() => abrirEditar(c)}>✏️</button>
                      <button className="btn btn-danger btn-sm" style={{ padding: ".3rem .5rem", minHeight: 28 }} onClick={() => setConfirmarElim(c)}>🗑</button>
                    </div>
                  </div>
                </div>
              );
            })}
            {filtrados.length === 0 && <div className="empty">Sin clientes{buscar ? " encontrados" : " registrados"}</div>}

            {modal && (
              <Modal title={editCliente ? "Editar cliente" : "Nuevo cliente"} onClose={() => setModal(false)}>
                {err && <div className="alert alert-error">{err}</div>}
                <div className="form-group"><label>Nombre</label><input value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Nombre del cliente" autoFocus /></div>
                <div className="form-group"><label>Teléfono (opcional)</label><input value={tel} onChange={(e) => setTel(e.target.value)} placeholder="+52 555 000 0000" /></div>
                <div style={{ display: "flex", gap: ".6rem" }}>
                  <button className="btn btn-secondary" onClick={() => setModal(false)}>Cancelar</button>
                  <button className="btn btn-primary" onClick={guardar} disabled={loading}>{loading ? <span className="spinner" /> : editCliente ? "Guardar cambios" : "Guardar"}</button>
                </div>
              </Modal>
            )}

            {confirmarElim && (
              <div className="riesgo-overlay">
                <div className="riesgo-card">
                  <div style={{ fontSize: "1.1rem", fontWeight: 800, color: "#ef4444" }}>🗑 Eliminar cliente</div>
                  <div style={{ fontSize: "var(--text-base)", color: "#94a3b8" }}>
                    ¿Eliminar a <strong style={{ color: "#e2e8f0" }}>{confirmarElim.nombre}</strong>? Esta acción no se puede deshacer. El historial de ventas asociado se conserva.
                  </div>
                  <div style={{ display: "flex", gap: ".6rem", marginTop: ".3rem" }}>
                    <button className="btn btn-secondary" onClick={() => setConfirmarElim(null)}>Cancelar</button>
                    <button className="btn btn-danger" onClick={eliminar} disabled={loading}>{loading ? <span className="spinner" /> : "Sí, eliminar"}</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── VENTAS ────────────────────────────────────────────────
      const TIPOS = [120, 240, 360];

      function Ventas({ sims, clientes: clientesIniciales, lotesPorSim, config, userId, onRefresh }) {
        const [paso, setPaso] = useState(1);
        const [paquetes, setPaquetes] = useState({ 120: 0, 240: 0, 360: 0 });
        const [simSel, setSimSel] = useState(null);
        const [clienteSel, setClienteSel] = useState(null);
        const [clientes, setClientes] = useState(clientesIniciales);
        const [buscar, setBuscar] = useState("");
        const [creandoCliente, setCreandoCliente] = useState(false);
        const [precioEdit, setPrecioEdit] = useState("");
        const [loading, setLoading] = useState(false);
        const [err, setErr] = useState("");
        const [ok, setOk] = useState("");
        const [clienteRiesgoAlto, setClienteRiesgoAlto] = useState(null);

        useEffect(() => { setClientes(clientesIniciales); }, [clientesIniciales]);

        const costo_op = config?.costo_operativo || 5;
        const totalCreditos = TIPOS.reduce((s, t) => s + paquetes[t] * t, 0);
        const totalPaquetes = TIPOS.reduce((s, t) => s + paquetes[t], 0);
        const hayPaquetes = totalCreditos > 0;

        function cambiarQty(tipo, delta) {
          setPaquetes((prev) => ({ ...prev, [tipo]: Math.max(0, prev[tipo] + delta) }));
          setSimSel(null);
        }

        // FIX — Eliminar hayPaquetes de las dependencias (es variable derivada, no state)
        const simsDisponibles = useMemo(() => {
          if (totalCreditos === 0 || totalPaquetes === 0) return [];
          return sims
            .filter((s) => s.activa && s.recargas_restantes >= totalPaquetes && s.saldo_disponible >= totalCreditos + costo_op)
            .map((s) => {
              const cpp = cppSim(lotesPorSim[s.id] || []);
              const costo_real_total = +(cpp * totalCreditos).toFixed(4);
              const precio_sugerido = +TIPOS.reduce((acc, t) => {
                const cr = +(cpp * t).toFixed(4);
                return acc + precioSugerido(cr, t, config) * paquetes[t];
              }, 0).toFixed(2);
              const sin_lotes = (lotesPorSim[s.id] || []).length === 0;
              return { ...s, cpp, costo_real_total, precio_sugerido, sin_lotes };
            })
            .sort((a, b) => {
              if (a.sin_lotes !== b.sin_lotes) return a.sin_lotes ? 1 : -1;
              return b.saldo_disponible - a.saldo_disponible;
            });
        }, [sims, lotesPorSim, paquetes, totalCreditos, totalPaquetes, costo_op, config]);

        function reset() {
          setPaso(1); setPaquetes({ 120: 0, 240: 0, 360: 0 }); setSimSel(null); setClienteSel(null);
          setBuscar(""); setCreandoCliente(false); setPrecioEdit(""); setErr(""); setOk(""); setClienteRiesgoAlto(null);
        }

        function avanzarPaso1() {
          if (!hayPaquetes) return setErr("Selecciona al menos un paquete");
          setErr(""); setPaso(2);
        }

        function selSim(sim) { setSimSel(sim); setPrecioEdit(sim.precio_sugerido.toString()); setPaso(3); }
        function saltarCliente() { setClienteSel(null); setPaso(4); }

        function selCliente(c) {
          setBuscar("");
          const { nivel } = calcularRiesgo(c, config);
          if (nivel === "alto") { setClienteRiesgoAlto(c); }
          else { setClienteSel(c); setPaso(4); }
        }

        function confirmarClienteRiesgo() { setClienteSel(clienteRiesgoAlto); setClienteRiesgoAlto(null); setPaso(4); }

        async function confirmar() {
          if (!simSel) return;
          const precio = parseFloat(precioEdit);
          if (!precioEdit || isNaN(precio) || precio <= 0) { setErr("Ingresa un precio de venta válido"); return; }
          if (simSel.sin_lotes) {
            const ok = window.confirm("⚠️ Esta SIM no tiene lotes cargados. La ganancia calculada no es confiable. ¿Continuar?");
            if (!ok) return;
          }
          setLoading(true); setErr("");

          const lineas = TIPOS.flatMap((t) => Array.from({ length: paquetes[t] }, () => t)).filter(Boolean);
          const gananciaTotal = precio - simSel.costo_real_total - costo_op;

          const { error } = await sb.rpc("registrar_venta_multiple", {
            p_cliente_id: clienteSel?.id || null,
            p_sim_id: simSel.id,
            p_paquetes: JSON.stringify(TIPOS.filter((t) => paquetes[t] > 0).map((t) => ({ tipo: t, qty: paquetes[t] }))),
            p_precio_total: precio,
            p_costo_real_total: simSel.costo_real_total,
            p_costo_op: costo_op,
          });

          if (error) { setErr(error.message); setLoading(false); return; }

          setOk(`✅ Venta registrada — ${lineas.length} paquetes · Ganancia: $${gananciaTotal.toFixed(2)}`);
          onRefresh();
          setTimeout(reset, 2800);
          setLoading(false);
        }

        const nivelColor = { bajo: "badge-green", medio: "badge-yellow", alto: "badge-red" };
        const filtrados = clientes.filter((c) => c.nombre.toLowerCase().includes(buscar.toLowerCase()) || (c.telefono || "").includes(buscar));

        if (ok) return (
          <div className="page" style={{ justifyContent: "center", alignItems: "center", minHeight: "60vh" }}>
            <div className="alert alert-success" style={{ textAlign: "center", fontSize: "var(--text-md)", padding: "var(--space-xl)" }}>{ok}</div>
          </div>
        );

        const titulos = { 1: "Armar pedido", 2: "¿Desde qué SIM?", 3: "¿Para quién?", 4: "Confirmar venta" };

        return (
          <div className="page">
            {clienteRiesgoAlto && <ModalRiesgoAlto cliente={clienteRiesgoAlto} onConfirmar={confirmarClienteRiesgo} onCancelar={() => setClienteRiesgoAlto(null)} />}

            <div className="page-header">
              <span className="page-title">{titulos[paso]}</span>
              {paso > 1 && (
                <button className="btn btn-secondary btn-sm" onClick={() => { if (paso === 3) setSimSel(null); setPaso((p) => p - 1); }}>← Atrás</button>
              )}
            </div>
            {err && <div className="alert alert-error">{err}</div>}

            {paso === 1 && (
              <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-md)" }}>
                <div style={{ fontSize: "var(--text-sm)", color: "#64748b" }}>
                  Selecciona cuántos paquetes de cada tipo. El costo operativo (${costo_op}) se cobra una sola vez por transacción.
                </div>
                {TIPOS.map((t) => {
                  const disponible = sims.some((s) => s.activa && s.recargas_restantes > 0 && s.saldo_disponible >= t + costo_op);
                  return (
                    <div key={t} className="paquete-row">
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: "var(--text-md)", color: disponible ? "#e2e8f0" : "#475569" }}>{t} créditos</div>
                        {!disponible && <div style={{ fontSize: "var(--text-xs)", color: "#ef4444" }}>Sin SIM disponible</div>}
                      </div>
                      <button className="qty-btn" onClick={() => cambiarQty(t, -1)} disabled={paquetes[t] === 0}>−</button>
                      <span className="qty-num" style={{ color: paquetes[t] > 0 ? "#38bdf8" : "#475569" }}>{paquetes[t]}</span>
                      <button className="qty-btn" onClick={() => cambiarQty(t, 1)} disabled={!disponible}>+</button>
                    </div>
                  );
                })}
                {hayPaquetes && (
                  <div style={{ background: "#064e3b", borderRadius: 10, padding: ".9rem", border: "1px solid #166534" }}>
                    <div style={{ fontSize: "var(--text-xs)", color: "#86efac", marginBottom: ".3rem" }}>RESUMEN DEL PEDIDO</div>
                    {TIPOS.filter((t) => paquetes[t] > 0).map((t) => (
                      <div key={t} style={{ display: "flex", justifyContent: "space-between", fontSize: "var(--text-sm)", color: "#86efac" }}>
                        <span>{paquetes[t]}× {t} cr.</span><span>{paquetes[t] * t} cr. totales</span>
                      </div>
                    ))}
                    <div style={{ borderTop: "1px solid #166534", marginTop: ".5rem", paddingTop: ".5rem", display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: "var(--text-md)", color: "#22c55e" }}>
                      <span>Total: {totalCreditos} créditos</span>
                      <span>{totalPaquetes} paquete{totalPaquetes !== 1 ? "s" : ""}</span>
                    </div>
                  </div>
                )}
                <button className="btn btn-primary" onClick={avanzarPaso1} disabled={!hayPaquetes}>Continuar →</button>
              </div>
            )}

            {paso === 2 && (
              <>
                {simsDisponibles.length === 0
                  ? <div className="alert alert-error">No hay SIMs con suficiente saldo ({totalCreditos} cr.) y {totalPaquetes} recarga{totalPaquetes !== 1 ? "s" : ""} disponibles.</div>
                  : simsDisponibles.map((sim, idx) => {
                      const dots = Array.from({ length: sim.limite_diario }, (_, i) => i < sim.recargas_restantes);
                      return (
                        <div key={sim.id} className={`sim-select-card ${simSel?.id === sim.id ? "selected" : ""}`} onClick={() => selSim(sim)}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: "var(--space-sm)" }}>
                              <span style={{ fontWeight: 700, color: "#38bdf8" }}>📱 {simLabel(sim)}</span>
                              {idx === 0 && <span className="badge badge-green">Recomendada</span>}
                            </div>
                            {sim.nombre && <div style={{ fontSize: "var(--text-xs)", color: "#64748b", marginTop: ".1rem" }}>{sim.numero}</div>}
                            {sim.sin_lotes && <div style={{ fontSize: "var(--text-xs)", color: "#fbbf24", marginTop: ".2rem" }}>⚠️ Sin lotes — ganancia estimada no confiable</div>}
                            <div style={{ display: "flex", gap: "1rem", marginTop: ".4rem", fontSize: "var(--text-sm)", color: "#94a3b8" }}>
                              <span>{Number(sim.saldo_disponible).toLocaleString()} cr.</span>
                              <span>{sim.recargas_restantes}/{sim.limite_diario} recargas</span>
                            </div>
                            <div className="recargas-bar" style={{ marginTop: "var(--space-sm)" }}>{dots.map((u, i) => <div key={i} className={`recarga-dot ${u ? "used" : ""}`} />)}</div>
                          </div>
                          <div style={{ textAlign: "right", flexShrink: 0 }}>
                            <div style={{ color: sim.sin_lotes ? "#fbbf24" : "#22c55e", fontWeight: 700, fontSize: "var(--text-md)" }}>
                              {sim.sin_lotes ? "?" : `$${(sim.precio_sugerido - sim.costo_real_total - costo_op).toFixed(2)}`}
                            </div>
                            <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>ganancia</div>
                          </div>
                        </div>
                      );
                    })
                }
              </>
            )}

            {paso === 3 && (
              <>
                {creandoCliente
                  ? <FormNuevoCliente userId={userId} onCreado={(c) => { setClientes((prev) => prev.find((x) => x.id === c.id) ? prev : [...prev, c]); setClienteSel(c); setCreandoCliente(false); setPaso(4); }} onCancelar={() => setCreandoCliente(false)} />
                  : <>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontSize: "var(--text-sm)", color: "#94a3b8" }}>Selecciona o crea un cliente</span>
                        <button className="btn btn-secondary btn-sm" onClick={saltarCliente}>Sin cliente →</button>
                      </div>
                      <input value={buscar} onChange={(e) => setBuscar(e.target.value)} placeholder="🔍 Buscar cliente..." />
                      <button className="link-btn" onClick={() => setCreandoCliente(true)}>+ Crear nuevo cliente</button>
                      {filtrados.map((c) => {
                        const { nivel } = calcularRiesgo(c, config);
                        return (
                          <div key={c.id} className="list-item" style={{ cursor: "pointer" }} onClick={() => selCliente(c)}>
                            <div style={{ width: 38, height: 38, borderRadius: "50%", background: "#1e293b", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, flexShrink: 0 }}>{c.nombre.charAt(0).toUpperCase()}</div>
                            <div className="list-item-info">
                              <div className="list-item-title">{c.nombre}</div>
                              <div className="list-item-sub">Deuda: ${Number(c.deuda_total).toFixed(2)}</div>
                            </div>
                            <span className={`badge ${nivelColor[nivel]}`}>{nivel}</span>
                          </div>
                        );
                      })}
                      {filtrados.length === 0 && <div className="empty" style={{ padding: "1rem" }}>{buscar ? "Sin resultados para tu búsqueda" : "Sin clientes registrados"}</div>}
                    </>
                }
              </>
            )}

            {paso === 4 && simSel && (() => {
              const precio = parseFloat(precioEdit);
              const precioValido = !isNaN(precio) && precio > 0;
              const ganancia = precioValido ? precio - simSel.costo_real_total - costo_op : null;
              return (
                <>
                  <div className="form-group">
                    <label>Precio de venta total</label>
                    <input type="number" value={precioEdit} onChange={(e) => { setPrecioEdit(e.target.value); setErr(""); }} placeholder="Ingresa el precio total" inputMode="decimal" />
                    {!precioValido && precioEdit !== "" && <div style={{ fontSize: "var(--text-xs)", color: "#ef4444", marginTop: "var(--space-xs)" }}>⚠️ Ingresa un precio válido mayor a 0</div>}
                  </div>
                  <div className="resumen-box">
                    <div className="resumen-row"><span style={{ color: "#64748b" }}>Cliente</span><span style={{ fontWeight: 600 }}>{clienteSel?.nombre || <span style={{ color: "#475569" }}>Sin cliente</span>}</span></div>
                    <div className="resumen-row"><span style={{ color: "#64748b" }}>SIM</span><span style={{ fontWeight: 600, color: "#38bdf8" }}>📱 {simLabel(simSel)}</span></div>
                    <div className="divider" />
                    {TIPOS.filter((t) => paquetes[t] > 0).map((t) => (
                      <div key={t} className="resumen-row"><span style={{ color: "#64748b" }}>{paquetes[t]}× recarga {t} cr.</span><span>{paquetes[t] * t} cr.</span></div>
                    ))}
                    <div className="resumen-row"><span style={{ color: "#64748b" }}>Total créditos</span><span style={{ fontWeight: 600 }}>{totalCreditos} cr.</span></div>
                    <div className="resumen-row"><span style={{ color: "#64748b" }}>Costo saldo</span><span>${simSel.costo_real_total.toFixed(4)}</span></div>
                    <div className="resumen-row"><span style={{ color: "#64748b" }}>Costo operativo</span><span style={{ color: "#94a3b8" }}>${costo_op} (único)</span></div>
                    <div className="resumen-row highlight">
                      <span>Ganancia estimada</span>
                      <span style={{ color: ganancia === null ? "#64748b" : ganancia >= 0 ? "#22c55e" : "#ef4444" }}>
                        {ganancia === null ? "—" : `$${ganancia.toFixed(2)}`}
                      </span>
                    </div>
                  </div>
                  {simSel.sin_lotes && <div className="alert alert-warning">⚠️ Esta SIM no tiene lotes cargados. La ganancia mostrada no es confiable.</div>}
                  {ganancia !== null && ganancia < 0 && <div className="alert alert-warning">⚠️ Este precio genera pérdida.</div>}
                  <button className="btn btn-primary" onClick={confirmar} disabled={loading || !precioValido}>
                    {loading ? <span className="spinner" /> : `✅ Confirmar venta (${totalPaquetes} paquete${totalPaquetes !== 1 ? "s" : ""})`}
                  </button>
                </>
              );
            })()}
          </div>
        );
      }

      // ── HISTORIAL ─────────────────────────────────────────────
      function CalendarioHistorial({ ventas, simsMap, clientesMap, onCobrar, loading }) {
        const hoy = new Date();
        const [mes, setMes] = useState(hoy.getMonth());
        const [anio, setAnio] = useState(hoy.getFullYear());
        const [diaSelec, setDiaSelec] = useState(hoy.getDate());

        // FIX — Usar hora local (getFullYear/Month/Date) para agrupar, igual que el resto del calendario
        const ventasPorDia = useMemo(() => {
          const m = {};
          ventas.forEach((v) => {
            const d = new Date(v.fecha);
            if (d.getFullYear() === anio && d.getMonth() === mes) {
              const k = d.getDate();
              if (!m[k]) m[k] = [];
              m[k].push(v);
            }
          });
          return m;
        }, [ventas, mes, anio]);

        const primerDia = new Date(anio, mes, 1).getDay();
        const diasEnMes = new Date(anio, mes + 1, 0).getDate();
        const celdas = primerDia + diasEnMes;

        const nombresMes = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
        const diasSem = ["D","L","M","X","J","V","S"];

        function navMes(delta) {
          let m = mes + delta, y = anio;
          if (m < 0) { m = 11; y--; }
          if (m > 11) { m = 0; y++; }
          setMes(m); setAnio(y); setDiaSelec(null);
        }

        const ventasDia = diaSelec ? (ventasPorDia[diaSelec] || []) : [];
        const esMesActual = mes === hoy.getMonth() && anio === hoy.getFullYear();

        return (
          <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-md)" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <button onClick={() => navMes(-1)} style={{ background: "none", border: "none", color: "#64748b", fontSize: "1.2rem", cursor: "pointer", padding: "var(--space-xs)" }}>‹</button>
              <span style={{ fontWeight: 700, fontSize: "var(--text-md)" }}>{nombresMes[mes]} {anio}</span>
              <button onClick={() => navMes(1)} style={{ background: "none", border: "none", color: "#64748b", fontSize: "1.2rem", cursor: "pointer", padding: "var(--space-xs)" }}>›</button>
            </div>

            <div className="cal-header">{diasSem.map((d) => <div key={d} className="cal-day-label">{d}</div>)}</div>

            <div className="cal-grid">
              {Array.from({ length: Math.ceil(celdas / 7) * 7 }, (_, i) => {
                const dia = i - primerDia + 1;
                const valido = dia >= 1 && dia <= diasEnMes;
                const esHoyCell = esMesActual && dia === hoy.getDate();
                const tieneVentas = valido && ventasPorDia[dia]?.length > 0;
                const tienePendiente = tieneVentas && ventasPorDia[dia].some((v) => v.estado_pago === "pendiente");
                const seleccionado = diaSelec === dia && valido;
                return (
                  <div key={i} className={`cal-cell ${!valido ? "empty" : ""} ${esHoyCell ? "today" : ""} ${tieneVentas ? "has-ventas" : ""} ${seleccionado ? "selected" : ""}`} onClick={() => valido && setDiaSelec(seleccionado ? null : dia)}>
                    {valido && <>
                      <span className="cal-cell-num">{dia}</span>
                      {tieneVentas && <div className={`cal-cell-dot ${tienePendiente ? "pendiente" : ""}`} />}
                    </>}
                  </div>
                );
              })}
            </div>

            {diaSelec && (
              <div style={{ display: "flex", flexDirection: "column", gap: "var(--space-sm)" }}>
                <div style={{ fontSize: "var(--text-xs)", color: "#64748b", fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em" }}>
                  {diaSelec} de {nombresMes[mes]} — {ventasDia.length} venta{ventasDia.length !== 1 ? "s" : ""}
                  {ventasDia.length > 0 && (
                    <span style={{ marginLeft: "var(--space-sm)", color: "#22c55e" }}>
                      · ${ventasDia.filter((v) => v.estado_pago === "pagado").reduce((s, v) => s + Number(v.ganancia), 0).toFixed(2)} cobrado
                    </span>
                  )}
                </div>
                {ventasDia.length === 0
                  ? <div className="empty" style={{ padding: "1rem" }}>Sin ventas este día</div>
                  : ventasDia.sort((a, b) => new Date(b.fecha) - new Date(a.fecha)).map((v) => {
                      const cliente = v.cliente_id ? clientesMap[v.cliente_id] : null;
                      const sim = simsMap[v.sim_id];
                      return (
                        <div key={v.id} className="list-item" style={{ flexDirection: "column", gap: "var(--space-sm)", alignItems: "stretch" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div>
                              <div style={{ fontWeight: 700 }}>{cliente?.nombre || <span style={{ color: "#475569" }}>Sin cliente</span>}</div>
                              <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>{new Date(v.fecha).toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" })} · {sim ? simLabel(sim) : "—"}</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div style={{ fontWeight: 700 }}>{v.cantidad} cr.</div>
                              <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>${Number(v.precio_venta).toFixed(2)}</div>
                            </div>
                          </div>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span className={`badge ${v.estado_pago === "pagado" ? "badge-green" : "badge-yellow"}`}>{v.estado_pago}</span>
                            <span style={{ fontSize: "var(--text-sm)", color: "#22c55e", fontWeight: 600 }}>+${Number(v.ganancia).toFixed(2)}</span>
                            {v.estado_pago === "pendiente" && (
                              <button className="btn btn-success btn-sm" onClick={() => onCobrar(v)} disabled={loading === v.id}>
                                {loading === v.id ? <span className="spinner" /> : "✓ Cobrado"}
                              </button>
                            )}
                          </div>
                        </div>
                      );
                    })
                }
              </div>
            )}
          </div>
        );
      }

      function Historial({ ventas, sims, clientes, onRefresh }) {
        const [vista, setVista] = useState("lista");
        const [filtro, setFiltro] = useState("todos");
        const [loading, setLoading] = useState(null);
        const [errCobro, setErrCobro] = useState("");

        const simsMap = useMemo(() => Object.fromEntries(sims.map((s) => [s.id, s])), [sims]);
        const clientesMap = useMemo(() => Object.fromEntries(clientes.map((c) => [c.id, c])), [clientes]);
        const filtradas = useMemo(() => [...ventas].filter((v) => filtro === "todos" || v.estado_pago === filtro).sort((a, b) => new Date(b.fecha) - new Date(a.fecha)), [ventas, filtro]);

        async function cobrar(v) {
          setLoading(v.id); setErrCobro("");
          const { error } = await sb.rpc("marcar_pago", { p_venta_id: v.id });
          if (error) setErrCobro(error.message);
          else onRefresh();
          setLoading(null);
        }

        return (
          <div className="page">
            <div className="page-header">
              <span className="page-title">Historial</span>
              <div style={{ display: "flex", background: "#0f172a", borderRadius: 8, padding: 2, gap: 2 }}>
                {[["lista","☰"],["calendario","📅"]].map(([v, icon]) => (
                  <button key={v} onClick={() => setVista(v)} style={{ padding: ".3rem .7rem", borderRadius: 6, border: "none", cursor: "pointer", fontSize: "var(--text-sm)", fontWeight: 600, background: vista === v ? "#334155" : "transparent", color: vista === v ? "#e2e8f0" : "#64748b", transition: ".15s" }}>{icon}</button>
                ))}
              </div>
            </div>
            {errCobro && <div className="alert alert-error">{errCobro}</div>}

            {vista === "lista" && <>
              <div style={{ display: "flex", gap: ".4rem" }}>
                {["todos","pendiente","pagado"].map((f) => (
                  <button key={f} onClick={() => setFiltro(f)} style={{ padding: ".4rem .9rem", borderRadius: "999px", border: "1.5px solid", fontSize: "var(--text-xs)", cursor: "pointer", fontWeight: 600, borderColor: filtro === f ? "#38bdf8" : "#334155", background: filtro === f ? "#0c2a4a" : "transparent", color: filtro === f ? "#38bdf8" : "#64748b" }}>
                    {f.charAt(0).toUpperCase() + f.slice(1)}
                  </button>
                ))}
              </div>
              {filtradas.map((v) => {
                const cliente = v.cliente_id ? clientesMap[v.cliente_id] : null;
                const sim = simsMap[v.sim_id];
                return (
                  <div key={v.id} className="list-item" style={{ flexDirection: "column", gap: "var(--space-sm)", alignItems: "stretch" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div>
                        <div style={{ fontWeight: 700 }}>{cliente?.nombre || <span style={{ color: "#475569" }}>Sin cliente</span>}</div>
                        <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>{new Date(v.fecha).toLocaleString("es", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })} · {sim ? simLabel(sim) : "—"}</div>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontWeight: 700 }}>{v.cantidad} cr.</div>
                        <div style={{ fontSize: "var(--text-xs)", color: "#64748b" }}>${Number(v.precio_venta).toFixed(2)}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span className={`badge ${v.estado_pago === "pagado" ? "badge-green" : "badge-yellow"}`}>{v.estado_pago}</span>
                      <span style={{ fontSize: "var(--text-sm)", color: "#22c55e", fontWeight: 600 }}>+${Number(v.ganancia).toFixed(2)}</span>
                      {v.estado_pago === "pendiente" && (
                        <button className="btn btn-success btn-sm" onClick={() => cobrar(v)} disabled={loading === v.id}>
                          {loading === v.id ? <span className="spinner" /> : "✓ Cobrado"}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
              {filtradas.length === 0 && <div className="empty">Sin ventas{filtro !== "todos" ? " en este filtro" : ""}</div>}
            </>}

            {vista === "calendario" && <CalendarioHistorial ventas={ventas} simsMap={simsMap} clientesMap={clientesMap} onCobrar={cobrar} loading={loading} />}
          </div>
        );
      }

      // ── APP PRINCIPAL ─────────────────────────────────────────
      function App() {
        const [user, setUser] = useState(undefined);
        const [tab, setTab] = useState("dashboard");
        const [sims, setSims] = useState([]);
        const [lotesPorSim, setLotesPorSim] = useState({});
        const [clientes, setClientes] = useState([]);
        const [ventas, setVentas] = useState([]);
        const [config, setConfig] = useState(null);
        // FIX — Usar ref para saber si el componente sigue montado y evitar setState huérfano
        const montado = useRef(true);
        const cargando = useRef(false);

        useEffect(() => {
          montado.current = true;
          return () => { montado.current = false; };
        }, []);

        useEffect(() => {
          sb.auth.getSession().then(({ data }) => {
            if (montado.current) setUser(data.session?.user ?? null);
          });
          const { data: { subscription } } = sb.auth.onAuthStateChange((evento, session) => {
            // FIX — Ignorar eventos duplicados de INITIAL_SESSION que ya procesó getSession
            if (evento === "INITIAL_SESSION") return;
            if (montado.current) setUser(session?.user ?? null);
          });
          return () => subscription.unsubscribe();
        }, []);

        const cargar = useCallback(async () => {
          // FIX — Guard con timeout de seguridad: si cargando lleva más de 10s, forzar reset
          if (cargando.current) return;
          cargando.current = true;
          const timeout = setTimeout(() => { cargando.current = false; }, 10000);
          try {
            const [
              { data: s },
              { data: l },
              { data: c },
              { data: v },
              { data: cfg },
            ] = await Promise.all([
              sb.from("sims").select("*").eq("activa", true).order("created_at"),
              // FIX — Filtrar lotes por user_id para evitar mezcla entre usuarios
              sb.from("lotes_saldo").select("*").order("fecha_compra"),
              sb.from("clientes").select("*").order("nombre"),
              // FIX — Limitar ventas a las últimas 500 para no bloquear con volúmenes altos
              sb.from("ventas").select("*").order("fecha", { ascending: false }).limit(500),
              sb.from("configuracion").select("*").maybeSingle(),
            ]);

            if (!montado.current) return;

            setSims(s || []);
            const por_sim = {};
            (l || []).forEach((x) => {
              if (!por_sim[x.sim_id]) por_sim[x.sim_id] = [];
              por_sim[x.sim_id].push(x);
            });
            setLotesPorSim(por_sim);
            setClientes(c || []);
            setVentas(v || []);
            setConfig(cfg);
          } catch (e) {
            console.error("Error al cargar datos:", e);
          } finally {
            clearTimeout(timeout);
            cargando.current = false;
          }
        }, []);

        useEffect(() => { if (user) cargar(); }, [user, cargar]);

        async function logout() {
          await sb.auth.signOut();
          if (!montado.current) return;
          setUser(null); setSims([]); setLotesPorSim({}); setClientes([]); setVentas([]); setConfig(null);
        }

        if (user === undefined) return (
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh" }}>
            <span className="spinner" style={{ width: 32, height: 32, borderWidth: 3 }} />
          </div>
        );

        if (!user) return <Auth onAuth={setUser} />;

        const navItems = [
          { id: "dashboard", label: "Inicio", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> },
          { id: "sims", label: "SIMs", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> },
          { id: "ventas", label: "Vender", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> },
          { id: "clientes", label: "Clientes", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> },
          { id: "historial", label: "Historial", icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> },
        ];

        return (
          <div className="app">
            <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", display: "flex", flexDirection: "column" }}>
              {tab === "dashboard" && <Dashboard sims={sims} ventas={ventas} lotesPorSim={lotesPorSim} clientes={clientes} config={config} onVender={() => setTab("ventas")} />}
              {tab === "sims"      && <Sims sims={sims} lotesPorSim={lotesPorSim} userId={user.id} onRefresh={cargar} />}
              {tab === "ventas"    && <Ventas sims={sims} clientes={clientes} lotesPorSim={lotesPorSim} config={config} userId={user.id} onRefresh={cargar} />}
              {tab === "clientes"  && <Clientes clientes={clientes} config={config} userId={user.id} onRefresh={cargar} />}
              {tab === "historial" && <Historial ventas={ventas} sims={sims} clientes={clientes} onRefresh={cargar} />}
            </div>
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "var(--space-xs) var(--space-md)", background: "#0f172a", borderTop: "1px solid #1e293b" }}>
                <span style={{ fontSize: "var(--text-xs)", color: "#475569" }}>{user.email}</span>
                <button onClick={logout} style={{ background: "none", border: "none", color: "#64748b", fontSize: "var(--text-xs)", cursor: "pointer" }}>Cerrar sesión</button>
              </div>
              <nav className="nav">
                {navItems.map((n) => (
                  <button key={n.id} className={`nav-item ${tab === n.id ? "active" : ""}`} onClick={() => setTab(n.id)}>
                    {n.icon}{n.label}
                  </button>
                ))}
              </nav>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
